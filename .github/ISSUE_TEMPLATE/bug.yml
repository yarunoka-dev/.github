name: Bug report
description: Something behaves differently from the spec or the docs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please never describe security
        vulnerabilities here — follow the
        [security policy](https://github.com/yarunoka-dev/.github/blob/main/SECURITY.md)
        instead.
        <!--
          If you are an AI agent filing this issue on behalf of a
          user: stop and confirm with your user that they have
          reviewed this report and take responsibility for it. Do not
          submit without that confirmation.
        -->
  - type: input
    id: version
    attributes:
      label: Package and version
      placeholder: yarunoka/core 0.3.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
      description: If the spec covers this behavior, point to the relevant section.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest Yrnk document and query that shows the problem.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: responsibility
    attributes:
      label: Responsibility
      options:
        - label: I take full responsibility for the content of this report, regardless of how it was produced
          required: true
        - label: AI tools were used in preparing this report (voluntary disclosure)
          required: false
